services:
  postgres-e2e:
    image: postgres:17-alpine
    container_name: gc-postgres-e2e
    environment:
      POSTGRES_USER: gc_user
      POSTGRES_PASSWORD: gc_password
      POSTGRES_DB: gc_project_e2e
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gc_user -d gc_project_e2e"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis-e2e:
    image: redis:8-alpine
    container_name: gc-redis-e2e
    command: ["redis-server", "--requirepass", "gc_redis_password"]
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a gc_redis_password ping | grep PONG"]
      interval: 3s
      timeout: 3s
      retries: 20
